name: habit_tracker
description: A production-ready habit tracking app with Firebase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_analytics: ^11.3.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Charts
  fl_chart: ^0.69.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Location & Maps
  geolocator: ^12.0.0
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0

  # Authentication
  google_sign_in: ^6.2.1

  # Utilities
  intl: ^0.19.0
  permission_handler: ^11.3.1
  share_plus: ^10.0.3
  uuid: ^4.4.2
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.5
  csv: ^6.0.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # UI
  lottie: ^3.1.2
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts: Download Inter from https://fonts.google.com/specimen/Inter
  # Place TTF files in assets/fonts/ then uncomment below:
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
